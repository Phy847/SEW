<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grundlagen</title>
    <style>
        #counterBtn {
            color: skyblue;
        }
    </style>
</head>
<body>

    <div>
    <!--Click Counter-->
    <button id="counterBtn">
        Counter:
        <span id="clickCount">0</span>

    <div>
    <!--ToDo Liste-->

    <input type="text" id ="todoInput">
    <button id="addTodo">Hinzufügen</button>
    <ul id="todoItems">
        <!--<li>Neues Element [x]<li>-->
    </ul>
    </div>

    <script src="script.js"></script>
    <!--Script Tags sollten immer ganz unten sein-->
</body>
</html>
